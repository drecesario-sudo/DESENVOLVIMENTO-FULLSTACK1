<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">

</head>


<body>

    <header></header>


    <main class="container-principal">
         
        <section class="calculadora">

            <header>
            </header>


                <!----------INPUTS DE NÚMERO DA CALCULADORA------------>
                <form id="formulario-calculadora" onsubmit="return false">
                        <div class="grupo-input">

                            <label for="numero1">Primeiro número</label>
                            <input type="number" id="numero1" placeholder="Digite o 1° número" required autofocus>
                        </div>

                        <div class="grupo-input">

                            <label for="numero2">Segundo número</label>
                            <input type="number" id="numero2" placeholder="Digite o 2° número" required autofocus>
                        </div>

                        
                     <!------------------OPERACOES--------------------->
                        <div class="grupo-operacoes">
                            <button data-operacao="+" title="Somar">+</button>
                            <button data-operacao="-" title="Subtrair">-</button>
                            <button data-operacao="*" title="multiplicar">*</button>
                            <button data-operacao="/" title="dividir">/</button>
                            <button data-operacao="C" title="limpar">C</button>
                        </div>

                </form>

                        



        </section>

    </main>


    
    <footer></footer>




    
</body>

<script href="script.js"></script>
</html>
