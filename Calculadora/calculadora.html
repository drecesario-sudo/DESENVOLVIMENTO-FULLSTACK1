<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="calculadora.css">
    <title>Calculadora</title>
</head>
<body>
    <div class="container">
        <h1>Calculadora</h1>

        <label for="operacao">Operação:</label>
        <select id="operacao">
            <option value="somar">Somar</option>
            <option value="subtrair">Subtrair</option>
            <option value="multiplicar">Multiplicar</option>
            <option value="dividir">Dividir</option>
        </select>

        <label for="primeiroNumero">Primeiro número:</label>
        <input type="number" id="primeiroNumero">

        <label for="segundoNumero">Segundo número:</label>
        <input type="number" id="segundoNumero">

        <label for="terceiroNumero">Terceiro número:</label>
        <input type="number" id="terceiroNumero">

        <div class="botoes">
            <button id="calcular">Calcular</button>
            <button id="limpar" class="limpar">Limpar</button>
        </div>

        <fieldset id="resposta">
            <legend>Resultado</legend>
            <output id="resultado"></output>
        </fieldset>
    </div>

    <!-- JavaScript carregado no final -->
    <script src="calculadora.js"></script>
</body>
</html>
