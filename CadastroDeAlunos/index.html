<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/index.css">
</head>

<body>
    <form id="formularioCadastro">
        <label for="cpf">CPF</label>

        <input type="text" name="cpf" id="cpf" maxlength="14" autofocus></input>
        <span id="mensagemCpf"
            style="font-size: 0.85em; 
            font-weight: bold;
            display: block;
            margin-top: 5px;
            margin-bottom: 10px;">
        </span>

        <label for="nome">Nome completo</label>
        <input type="text" id="nome" name="nome"  maxlength="100" required autofocus>
            <span id="mensagemNome"
            style="font-size: 0.85em; 
            font-weight: bold;
            display: block;
            margin-top: 5px;
            margin-bottom: 10px;">
        </span>
        
        <label for="cep">CEP</label>
        <input type="number" name="cep" id="cep" maxlength="9">
         <span id="mensagemCep"
            style="font-size: 0.85em; 
            font-weight: bold;
            display: block;
            margin-top: 5px;
            margin-bottom: 10px;">
        </span>

        <label for="uf">UF</label>
        <input type="number" name="uf" id="uf" maxlength="2">
         <span id="mensagemUf"
            style="font-size: 0.85em; 
            font-weight: bold;
            display: block;
            margin-top: 5px;
            margin-bottom: 10px;">
        </span>

        <label for="cidade">Cidade</label>
        <input type="text" name="cidade" id="cidade" maxlength="50">
         <span id="mensagemCidade"
            style="font-size: 0.85em; 
            font-weight: bold;
            display: block;
            margin-top: 5px;
            margin-bottom: 10px;">
        </span>

        <label for="bairro">Bairro</label>
        <input type="text" name="bairro" id="bairro" maxlenght="50">
        <span id="mensagemBairro"
            style="font-size: 0.85em; 
            font-weight: bold;
            display: block;
            margin-top: 5px;
            margin-bottom: 10px;">
        </span>

        <label for="rua">Rua</label>
        <input type="text" name="rua" id="rua" maxlength="100">
        <span id="mensagemBairro"
            style="font-size: 0.85em; 
            font-weight: bold;
            display: block;
            margin-top: 5px;
            margin-bottom: 10px;">
        </span>

        <label for="numero">Numero</label>
        <input type="number" name="numero" id="numero" maxlength="10">
        <span id="mensagemNumero"
            style="font-size: 0.85em; 
            font-weight: bold;
            display: block;
            margin-top: 5px;
            margin-bottom: 10px;">
        </span>

        <label for="complemento">Complemento</label>
        <input type="text" name="complemento" id="complemento" maxlength="100">
        <span id="mensagemComplemento"
            style="font-size: 0.85em; 
            font-weight: bold;
            display: block;
            margin-top: 5px;
            margin-bottom: 10px;">
        </span>

        <div>
            <button id="botaoBuscar">Buscar</button>
            <button id="botaoCadastrar">Cadastrar</button>
            <button id="botaoAtualizar">Atualizar</button>
            <button id="botaoExcluir">Excluir</button>
        </div>






    </form>
    
</body>
<script src="js/index.js"></script>
</html>
